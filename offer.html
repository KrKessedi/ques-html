<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Order Form</title>

		<link rel="stylesheet" href="./css/index.css" />
		<link rel="stylesheet" href="./css/layout/header_layout.css" />
		<link rel="stylesheet" href="./css/layout/footer_layout.css" />
		<style>
			/* Custom classes from original code */
			.custom-blue {
				color: #2c4ea5;
				border-color: #2c4ea5;
			}
			.font-montserrat {
				font-family: 'Montserrat', sans-serif;
			}

			/* Section */
			.section {
				padding-bottom: 2.5rem;
			}
			@media (min-width: 1024px) {
				.section {
					padding-bottom: 4rem;
				}
			}

			/* Container (assumed styling) */
			.container {
				max-width: 1280px;
				margin-left: auto;
				margin-right: auto;
				padding-left: 1rem;
				padding-right: 1rem;
			}

			/* Header */
			section .header-container {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 1.5rem;
				margin-top: 2rem;
			}
			@media (min-width: 1024px) {
				section .header-container {
					margin-top: 3rem;
					margin-bottom: 3.5rem;
				}
			}
			.header-back {
				font-size: 2.25rem;
			}
			@media (min-width: 1024px) {
				.header-back a {
					display: block;
				}
			}
			.header-title {
				font-size: 2.5rem;
				font-weight: 500;
			}
			@media (max-width: 600px) {
				.header-title {
					font-size: 1.875rem;
				}
			}
			@media (max-width: 415px) {
				.header-title {
					font-size: 1.375rem;
				}
			}

			/* Form */
			.form {
				width: 100%;
			}
			.form-sections {
				display: flex;
				justify-content: space-between;
				width: 100%;
				gap: 1rem;
			}
			@media (max-width: 1024px) {
				.form-sections {
					flex-direction: column;
					align-items: center;
				}
			}
			.form-section {
				width: 100%;
			}
			@media (min-width: 640px) {
				.form-section {
					width: 75%;
					margin-left: auto;
					margin-right: auto;
				}
			}
			@media (min-width: 1024px) {
				.form-section {
					width: 33.3333%;
				}
			}

			/* Section header */
			.section-header {
				display: flex;
				align-items: center;
				margin-bottom: 1.25rem;
			}
			.section-number {
				width: 2.5rem;
				height: 2.5rem;
				border-radius: 9999px;
				border: 2px solid #2c4ea5;
				display: flex;
				align-items: center;
				justify-content: center;
				color: #2c4ea5;
				font-weight: 700;
			}
			.section-title {
				margin-left: 1rem;
				font-size: 1.125rem;
				font-weight: 500;
			}

			/* Form fields */
			.form-group {
				margin-bottom: 1.25rem;
			}
			.form-label {
				display: block;
				font-size: 0.875rem;
				font-weight: 500;
			}
			.required {
				color: #ef4444;
			}
			.form-input {
				margin-top: 0.25rem;
				display: block;
				width: 80%;
				border: 1px solid #d1d5db;
				border-radius: 0.375rem;
				padding: 0.5rem 0.75rem;
				outline: none;
			}
			.form-input:focus {
				border: 2px solid #3b82f6;
				/* border-color: transparent; */
			}
			.form-input::placeholder {
				color: #9ca3af;
			}
			.form-input {
				appearance: textfield;
			}
			.form-input::-webkit-inner-spin-button,
			.form-input::-webkit-outer-spin-button {
				-webkit-appearance: none;
				margin: 0;
			}

			/* Footer section */
			section .footer-container {
				margin-top: 2rem;
				display: flex;
				flex-direction: column;
				align-items: flex-end;
				gap: 1rem;
			}
			@media (min-width: 1024px) {
				section .footer-container {
					flex-direction: row;
					justify-content: space-between;
				}
			}
			.terms-container {
				max-width: 50%;
				font-weight: 500;
			}
			.terms-text {
				font-size: 1rem;
			}
			.terms-checkbox-container {
				margin-top: 0.75rem;
			}
			.checkbox-group {
				display: flex;
				align-items: center;
			}
			.form-checkbox {
				width: 1rem;
				height: 1rem;
				border: 1px solid #d1d5db;
				border-radius: 0.25rem;
			}
			.form-checkbox:focus {
				border: 2px solid #2c4ea5;
			}
			.checkbox-label {
				margin-left: 0.5rem;
				font-size: 0.875rem;
			}
			.error-text {
				color: #ef4444;
				font-size: 0.75rem;
				margin-top: 0.25rem;
				display: none;
			}
			.error-text.active {
				display: block;
			}
			.link-underline {
				text-decoration: underline;
				color: #2c4ea5;
			}
			.submit-button {
				border: 0;
				width: 100%;
				display: inline-flex;
				align-items: center;
				justify-content: center;
				white-space: nowrap;
				height: 4rem;
				padding: 0.5rem 1.25rem;
				max-width: 27.6875rem;
				background-color: #f48218;
				color: white;
				border-radius: 0.625rem;
				font-size: 1.875rem;
				font-weight: 500;
			}
			@media (max-width: 768px) {
				.submit-button {
					height: auto;
				}
			}

			/* Modal (basic styling, shown when triggered) */
			.modal {
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background-color: rgba(0, 0, 0, 0.5);
				align-items: center;
				justify-content: center;
				z-index: 1000;
			}
			.modal.active {
				display: flex;
			}
			.modal-content {
				background-color: white;
				padding: 1.5rem;
				border-radius: 0.5rem;
				text-align: center;
				max-width: 24rem;
			}
			.modal-title {
				font-size: 1.25rem;
				font-weight: 600;
				margin-bottom: 1rem;
			}
			.modal-button {
				border: 0;
				background-color: #2c4ea5;
				color: white;
				padding: 0.5rem 1rem;
				border-radius: 0.375rem;
				cursor: pointer;
			}
		</style>
	</head>
	<body>
		<div id="header"></div>
		<section class="section">
			<div class="container">
				<!-- Header -->
				<div class="header-container">
					<div class="header-back">
						<a href="#" class="cursor-pointer">
							<img
								src="./assets/icons/left-arrow.svg"
								class="w-8"
								alt="Back"
								width="32"
							/>
						</a>
					</div>
					<span class="header-title font-montserrat">Оформление заказа</span>
					<div></div>
				</div>

				<!-- Form -->
				<form class="form" id="order-form">
					<div class="form-sections">
						<!-- Customer Information -->
						<div class="form-section">
							<div class="section-header">
								<div class="section-number">1</div>
								<h3 class="section-title">Информация о заказчике</h3>
							</div>
							<div>
								<div class="form-group">
									<label for="name" class="form-label">
										Имя<span class="required">*</span>
									</label>
									<input
										id="name"
										type="text"
										placeholder="Имя"
										class="form-input"
										aria-describedby="name-error"
									/>
									<span id="name-error" class="error-text"></span>
								</div>
								<div class="form-group">
									<label for="phone" class="form-label">
										Телефон<span class="required">*</span>
									</label>
									<input
										id="phone"
										type="number"
										placeholder="Телефон"
										class="form-input"
									/>
									<span id="phone-error" class="error-text"></span>
								</div>
								<div class="form-group">
									<label for="email" class="form-label">
										Почта<span class="required">*</span>
									</label>
									<input
										id="email"
										type="email"
										placeholder="example@gmail.com"
										class="form-input"
									/>
									<span id="email-error" class="error-text"></span>
								</div>
							</div>
						</div>

						<!-- Address -->
						<div class="form-section">
							<div class="section-header">
								<div class="section-number">2</div>
								<h3 class="section-title">Адрес</h3>
							</div>
							<div>
								<div class="form-group">
									<label for="country" class="form-label">
										Страна<span class="required">*</span>
									</label>
									<input
										id="country"
										type="text"
										placeholder="Кыргызстан"
										class="form-input"
									/>
									<span id="country-error" class="error-text"></span>
								</div>
								<div class="form-group">
									<label for="city" class="form-label">
										Город<span class="required">*</span>
									</label>
									<input
										id="city"
										type="text"
										placeholder="Бишкек"
										class="form-input"
									/>
									<span id="city-error" class="error-text"></span>
								</div>
								<div class="form-group">
									<label for="address" class="form-label">
										Адрес<span class="required">*</span>
									</label>
									<input
										id="address"
										type="text"
										placeholder="Номер дома и название улицы"
										class="form-input"
									/>
									<span id="address-error" class="error-text"></span>
								</div>
							</div>
						</div>

						<!-- Additional Info -->
						<div class="form-section">
							<div class="section-header">
								<div class="section-number">3</div>
								<h3 class="section-title">Дополнительно</h3>
							</div>
							<div>
								<div class="form-group">
									<label for="comment" class="form-label">Примечание</label>
									<input
										id="comment"
										type="text"
										placeholder="Необязательно"
										class="form-input"
									/>
								</div>
								<div class="form-group">
									<label for="promo_code" class="form-label">Промокод</label>
									<input
										id="promo_code"
										type="text"
										placeholder="Ввести код"
										class="form-input"
									/>
								</div>
							</div>
						</div>
					</div>

					<!-- Form Footer -->
					<div class="footer-container">
						<div class="terms-container">
							<p class="terms-text">
								Ваши персональные данные будут использоваться для обработки
								вашего заказа, поддержки вашего использования на этом веб-сайте
								и для других целей, описанных в нашем
								<a href="#" class="link-underline"
									>политика конфиденциальности</a
								>
							</p>
							<div class="terms-checkbox-container">
								<div class="checkbox-group">
									<input
										type="checkbox"
										id="acceptTerms"
										class="form-checkbox"
									/>
									<label for="acceptTerms" class="checkbox-label">
										Я прочитал(а) и принимаю
										<a href="#" class="link-underline">правила и условия</a>
										сайта
									</label>
								</div>
								<span id="acceptTerms-error" class="error-text"></span>
							</div>
						</div>
						<button type="submit" class="submit-button font-montserrat">
							Оформить заказ
						</button>
					</div>
				</form>

				<!-- Modal -->
				<div class="modal" id="success-modal">
					<div class="modal-content">
						<h3 class="modal-title">Заказ успешно оформлен!</h3>
						<button class="modal-button" onclick="closeModal()">Закрыть</button>
					</div>
				</div>
			</div>
		</section>

		<div id="footer"></div>
		<script src="./js/layout/layout-header.js"></script>
		<script src="./js/layout/layout-footer.js"></script>

		<script>
			// Form state
			const form = {
				name: '',
				email: '',
				phone: '',
				country: '',
				city: '',
				address: '',
				comment: '',
				promo_code: '',
				acceptTerms: false,
			}

			// Bind inputs to form state
			function bindInputs() {
				const inputs = [
					'name',
					'email',
					'phone',
					'country',
					'city',
					'address',
					'comment',
					'promo_code',
				]
				inputs.forEach((id) => {
					const input = document.getElementById(id)
					input.addEventListener('input', (e) => {
						form[id] = e.target.value
						clearError(id)
					})
				})

				const acceptTerms = document.getElementById('acceptTerms')
				acceptTerms.addEventListener('change', (e) => {
					form.acceptTerms = e.target.checked
					clearError('acceptTerms')
				})
			}

			// Clear error message
			function clearError(field) {
				const errorElement = document.getElementById(`${field}-error`)
				errorElement.textContent = ''
				errorElement.classList.remove('active')
			}

			// Validate form
			function validateForm() {
				const errors = {}
				if (!form.name) errors.name = 'Введите имя'
				if (!form.email) errors.email = 'Введите почту'
				if (!form.phone) errors.phone = 'Введите телефон'
				if (!form.country) errors.country = 'Введите страну'
				if (!form.city) errors.city = 'Введите город'
				if (!form.address) errors.address = 'Введите адрес'
				if (!form.acceptTerms) errors.acceptTerms = 'Вы должны принять условия'

				// Display errors
				Object.keys(errors).forEach((field) => {
					const errorElement = document.getElementById(`${field}-error`)
					errorElement.textContent = errors[field]
					errorElement.classList.add('active')
				})

				return Object.keys(errors).length === 0
			}

			// Handle form submission
			function handleSubmit(e) {
				e.preventDefault()
				if (validateForm()) {
					document.getElementById('success-modal').classList.add('active')
				}
			}

			// Close modal
			function closeModal() {
				document.getElementById('success-modal').classList.remove('active')
			}

			// Initialize
			document
				.getElementById('order-form')
				.addEventListener('submit', handleSubmit)
			bindInputs()
		</script>
	</body>
</html>
