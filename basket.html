<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Shopping Basket</title>
		<link rel="stylesheet" href="./css/index.css" />
		<link rel="stylesheet" href="./css/layout/header_layout.css" />
		<link rel="stylesheet" href="./css/layout/footer_layout.css" />
		<style>
			.custom-blue {
				border-color: #2c4ea5;
			}
			.font-montserrat {
				font-family: 'Montserrat', sans-serif;
			}

			/* Header styles */
			section .header-container {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 1.5rem;
				margin-top: 2rem;
			}
			@media (min-width: 1024px) {
				section .header-container {
					margin-top: 3rem;
					margin-bottom: 3.5rem;
				}
			}
			.header-title {
				font-size: 2.5rem;
				font-weight: 500;
			}
			@media (max-width: 600px) {
				.header-title {
					font-size: 1.875rem;
				}
			}
			@media (max-width: 415px) {
				.header-title {
					font-size: 1.375rem;
				}
			}
			.header-back {
				font-size: 2.25rem;
			}
			@media (min-width: 1024px) {
				.header-back a {
					display: block;
				}
			}

			/* Product list */
			.product-list {
				display: grid;
				grid-template-columns: 1fr;
				gap: 1.5rem;
			}

			/* Desktop product item */
			.product-item-desktop {
				display: none;
				grid-template-columns: repeat(2, 1fr);
				align-content: center;
				padding: 0.75rem 1.25rem;
				background-color: rgba(44, 78, 165, 0.1);
				border-radius: 1rem;
			}
			@media (min-width: 768px) {
				.product-item-desktop {
					display: grid;
				}
			}
			.product-image-container {
				margin-right: 1.0625rem;
				display: flex;
				gap: 1.25rem;
				align-items: center;
			}
			.product-image {
				border-radius: 1rem;
				object-fit: cover;
				width: 5rem;
				height: 5.1875rem;
				border: 1px solid #2c4ea5;
			}
			.product-title {
				font-size: 1.5rem;
				font-weight: 500;
			}
			@media (min-width: 1024px) {
				.product-title {
					font-size: 1.875rem;
				}
			}
			.product-info {
				display: flex;
				justify-content: space-between;
				align-items: center;
			}
			.product-weight {
				font-size: 1.25rem;
				font-weight: 600;
				color: #646464;
			}
			@media (min-width: 1024px) {
				.product-weight {
					font-size: 1.5rem;
				}
			}
			.quantity-controls {
				display: flex;
				align-items: center;
				gap: 0.5rem;
			}
			.quantity-icon {
				cursor: pointer;
			}
			@media (max-width: 1024px) {
				.quantity-icon {
					width: 1.5rem;
				}
			}
			.quantity-text {
				font-weight: 700;
				font-size: 1.125rem;
			}
			.product-price {
				font-size: 1.25rem;
				font-weight: 600;
			}
			@media (min-width: 1024px) {
				.product-price {
					font-size: 1.5rem;
				}
			}
			.remove-icon {
				cursor: pointer;
			}

			/* Mobile product item */
			.product-item-mobile {
				display: flex;
				align-items: center;
				gap: 0.5rem;
				padding: 0.5rem;
				background-color: rgba(44, 78, 165, 0.1);
				border-radius: 1rem;
			}
			@media (min-width: 768px) {
				.product-item-mobile {
					display: none;
				}
			}
			.product-image-mobile {
				border-radius: 1rem;
				object-fit: cover;
				width: 5.375rem;
				height: 5.625rem;
				border: 1px solid #2c4ea5;
				margin: auto;
			}
			.product-info-mobile {
				display: flex;
				width: 100%;
				flex-direction: column;
				align-items: center;
			}
			.product-header-mobile {
				width: 100%;
				display: flex;
				align-items: flex-start;
			}
			.product-details-mobile {
				width: 100%;
			}
			.product-title-mobile {
				font-size: 1.125rem;
				font-weight: 500;
			}
			.product-weight-mobile {
				font-weight: 600;
				color: #646464;
			}
			.remove-icon-mobile {
				cursor: pointer;
				width: 1.5rem;
			}
			.product-footer-mobile {
				width: 100%;
				display: flex;
				justify-content: space-between;
				align-items: flex-end;
			}
			.product-price-mobile {
				font-weight: 600;
			}
			.quantity-icon-mobile {
				cursor: pointer;
				width: 1.25rem;
			}

			/* Total section */
			.total-container {
				margin-top: 2rem;
			}
			.total-content {
				display: flex;
				justify-content: space-between;
				align-items: center;
			}
			.total-text {
				color: #2c4ea5;
				font-size: 1.25rem;
				font-weight: 600;
				line-height: 2rem;
			}
			@media (min-width: 1024px) {
				.total-text {
					font-size: 1.875rem;
					line-height: 2.5rem;
				}
			}
			.total-amount {
				display: block;
				font-weight: 600;
				margin-top: 1rem;
			}
			.checkout-button {
				background-color: #2c4ea5;
				color: white;
				padding: 0.5rem 2.5rem;
				border-radius: 9999px;
			}
			@media (min-width: 1024px) {
				.checkout-button {
					padding: 0.75rem 5rem;
				}
			}

			/* Section */
			.section {
				padding-bottom: 2.25rem;
				position: relative;
				z-index: 1;
				min-height: 20rem;
			}
			.container {
				max-width: 1400px;
				padding: 0 40px;
			}
		</style>
	</head>
	<body>
		<div id="header"></div>
		<section class="section">
			<div class="container mx-auto px-4">
				<!-- Header -->
				<div class="header-container">
					<div class="header-back">
						<a href="#" class="cursor-pointer">
							<img
								src="./assets/icons/left-arrow.svg"
								class="w-8"
								alt="Back"
								width="32"
							/>
						</a>
					</div>
					<span class="header-title font-montserrat">Список желаний</span>
					<div></div>
				</div>

				<!-- Products -->
				<div class="mx-auto">
					<div class="product-list" id="product-list"></div>
				</div>

				<!-- Total -->
				<div class="total-container">
					<div class="total-content">
						<div class="total-text font-montserrat">
							Общая сумма:
							<span class="total-amount" id="total-sum">0 сом</span>
						</div>
						<a href="/offer" class="checkout-button font-montserrat"
							>К оплате</a
						>
					</div>
				</div>
			</div>
		</section>
		<div id="footer"></div>
		<script src="./js/layout/layout-header.js"></script>
		<script src="./js/layout/layout-footer.js"></script>
		<script>
			const products = [
				{
					id: 1,
					title: 'Элегантные кольца из Стали',
					image: './assets/icons/kole.png',
					weight: '100мг',
					price: 200,
					quantity: 1,
				},
				{
					id: 15345,
					title: 'Элегантные кольца из Стали',
					image: './assets/icons/kole.png',
					weight: '100мг',
					price: 200,
					quantity: 1,
				},
				{
					id: 1212,
					title: 'Элегантные кольца из Стали',
					image: './assets/icons/kole.png',
					weight: '100мг',
					price: 200,
					quantity: 1,
				},
				{
					id: 198,
					title: 'Элегантные кольца из Стали',
					image: './assets/icons/kole.png',
					weight: '100мг',
					price: 200,
					quantity: 1,
				},
			]

			function renderProducts() {
				const productList = document.getElementById('product-list')
				productList.innerHTML = ''

				products.forEach((product) => {
					// Desktop View
					const desktopItem = `
                    <div class="product-item-desktop">
                        <div class="product-image-container">
                            <img src="${
															product.image ||
															'https://via.placeholder.com/300x200?text=Нет+картинки'
														}" 
                                 alt="${product.title}" 
                                 class="product-image" />
                            <h3 class="product-title font-montserrat">${
															product.title
														}</h3>
                        </div>
                        <div class="product-info">
                            <h5 class="product-weight font-montserrat">${
															product.weight
														}</h5>
                            <div class="quantity-controls">
                                <img src="./assets/icons/minusIcon.svg" 
                                     alt="Decrease" 
                                     class="quantity-icon" 
                                     onclick="updateQuantity(${
																				product.id
																			}, -1)" />
                                <span class="quantity-text">${
																	product.quantity
																}</span>
                                <img src="./assets/icons/PlusIcon.svg" 
                                     alt="Increase" 
                                     class="quantity-icon" 
                                     onclick="updateQuantity(${
																				product.id
																			}, 1)" />
                            </div>
                            <h5 class="product-price font-montserrat">${
															product.price
														} COM</h5>
                            <img src="./assets/icons/trashIcon.svg" 
                                 alt="Remove" 
                                 class="remove-icon" 
                                 onclick="removeProduct(${product.id})" />
                        </div>
                    </div>
                `

					// Mobile View
					const mobileItem = `
                    <div class="product-item-mobile">
                        <img src="${
													product.image ||
													'https://via.placeholder.com/300x200?text=Нет+картинки'
												}" 
                             alt="${product.title}" 
                             class="product-image-mobile" />
                        <div class="product-info-mobile">
                            <div class="product-header-mobile">
                                <div class="product-details-mobile">
                                    <h3 class="product-title-mobile font-montserrat">${
																			product.title
																		}</h3>
                                    <h5 class="product-weight-mobile font-montserrat">${
																			product.weight
																		}</h5>
                                </div>
                                <img src="./assets/icons/trashIcon.svg" 
                                     alt="Remove" 
                                     class="remove-icon-mobile" 
                                     onclick="removeProduct(${product.id})" />
                            </div>
                            <div class="product-footer-mobile">
                                <h5 class="product-price-mobile font-montserrat">${
																	product.price
																} COM</h5>
                                <div class="quantity-controls">
                                    <img src="./assets/icons/minusIcon.svg" 
                                         alt="Decrease" 
                                         class="quantity-icon-mobile" 
                                         onclick="updateQuantity(${
																						product.id
																					}, -1)" />
                                    <span class="quantity-text">${
																			product.quantity
																		}</span>
                                    <img src="./assets/icons/PlusIcon.svg" 
                                         alt="Increase" 
                                         class="quantity-icon-mobile" 
                                         onclick="updateQuantity(${
																						product.id
																					}, 1)" />
                                </div>
                            </div>
                        </div>
                    </div>
                `

					productList.innerHTML += desktopItem + mobileItem
				})

				updateTotal()
			}

			function updateQuantity(id, change) {
				const product = products.find((p) => p.id === id)
				if (product) {
					const newQuantity = product.quantity + change
					if (newQuantity >= 1) {
						product.quantity = newQuantity
						renderProducts()
					}
				}
			}

			function removeProduct(id) {
				const index = products.findIndex((p) => p.id === id)
				if (index !== -1) {
					products.splice(index, 1)
					renderProducts()
				}
			}

			function updateTotal() {
				const total = products.reduce(
					(sum, product) => sum + product.price * product.quantity,
					0
				)
				document.getElementById('total-sum').textContent = `${total} сом`
			}

			// Initial render
			renderProducts()
		</script>
	</body>
</html>
